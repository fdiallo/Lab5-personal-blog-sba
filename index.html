<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>The Document Object Model</title>
</head>

<body>
    <div class="container-signup-form ">
        <h1>Personal Blog</h1>
        <form id="postForm" novalidate>
            <div class="form-group-signup">
                <label for="title">Title:</label>
                <input type="text" id="title" name="title" placeholder="Enter title" required>
                <span class="error-message" id="titleError"></span>
            </div>
            <div class="form-group-signup">
                <label for="comment-box">Comment:</label>
                <textarea id="comment-box" name="comment-box" rows="4" cols="50" placeholder="Type here..."
                    minlength="8" maxlength="280" required></textarea>

                <span class="error-message-signup" id="commentError"></span>
            </div>

            <button type="submit" id="submitBtn" class="signup-button">Add</button>
        </form>
    </div>

    <ul id="postList"></ul>

    <dialog id="updateModal" style="position:fixed; background:white; border:1px solid #ccc; padding:20px;">
        <label for="title">Title:</label>
        <input type="text" id="editTitle">
        <label for="comment-box">Comment:</label>
        <textarea id="editComment" name="EditComment" rows="4" cols="50" placeholder="Type here..." minlength="8"
            maxlength="280" required></textarea>
        <button id="saveChangesBtn">Save Changes</button>
        <button id="closeBtn">Close</button>
    </dialog>

    <script src="script.js"></script>
</body>

</html>
